<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理员登录</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #f0f4f8;
    color: #2c3e50;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }
  .login-box {
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    padding: 40px 36px;
    width: 100%;
    max-width: 380px;
    text-align: center;
  }
  h1 { font-size: 20px; color: #1a3a6b; margin-bottom: 24px; }
  .form-group { margin-bottom: 16px; text-align: left; }
  label { display: block; font-size: 14px; margin-bottom: 4px; color: #555; }
  input[type="password"] {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid #d0ddea;
    border-radius: 6px;
    font-size: 16px;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="password"]:focus { border-color: #4a90d9; box-shadow: 0 0 0 2px rgba(74,144,217,0.15); }
  .btn {
    width: 100%;
    padding: 10px 0;
    background: #4a90d9;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    cursor: pointer;
    font-weight: 600;
    transition: background 0.2s;
  }
  .btn:hover { background: #357abd; }
  .flash-msg {
    background: #fff3cd;
    border: 1px solid #ffc107;
    color: #856404;
    padding: 8px 12px;
    border-radius: 6px;
    margin-bottom: 16px;
    font-size: 14px;
  }
</style>
</head>
<body>
<div class="login-box">
  <h1>🔒 管理员登录</h1>
  {% with messages = get_flashed_messages() %}
    {% if messages %}
      {% for msg in messages %}
        <div class="flash-msg">{{ msg }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}
  <form method="POST">
    <div class="form-group">
      <label for="password">管理密码</label>
      <input type="password" id="password" name="password" placeholder="请输入密码" required autofocus>
    </div>
    <button type="submit" class="btn">登 录</button>
  </form>
</div>
</body>
</html>
